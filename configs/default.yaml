# ─── Data ────────────────────────────────────────────────────────────
data:
  train_dir: data/train
  val_dir: data/val
  image_size: 256
  num_workers: 4

# ─── Diffusion ───────────────────────────────────────────────────────
diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 0.02

# ─── Model ───────────────────────────────────────────────────────────
model:
  in_channels: 3
  cond_channels: 3
  base_channels: 64
  channel_mults: [1, 2, 4, 8]
  attention_resolutions: [3]            # attention only at lowest resolution (16x16)
  num_res_blocks: 2
  dropout: 0.1
  gradient_checkpointing: true

# ─── Loss weights ────────────────────────────────────────────────────
loss:
  lambda_l1: 1.0                  # was 100.0 — too high, causes gradient spikes
  lambda_laplacian: 0.5
  lambda_gradient: 0.5
  lambda_histogram: 0.1
  lambda_perceptual: 0.0
  use_perceptual: false
  aux_warmup_frac: 0.05           # fraction of training before aux losses kick in

# ─── Training ────────────────────────────────────────────────────────
training:
  epochs: 200
  batch_size: 4
  learning_rate: 2.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_steps: 1000              # linear LR warmup before cosine decay
  ema_decay: 0.9999               # EMA smoothing for stable sampling
  min_snr_gamma: 5.0              # min-SNR-γ clamp (balances timestep gradients)
  sample_every_steps: 500         # save 4 val samples every N steps
  ddim_sample_steps: 50

# ─── Paths ───────────────────────────────────────────────────────────
paths:
  checkpoint_dir: checkpoints
  sample_dir: samples
  tensorboard_dir: runs
